<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prospectiva · follow-up</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="app">

        <div class="topbar">
            <div class="logo">Prospectiva <span>·</span> follow-up</div>
            <button class="reload-btn" onclick="carregarContatos()">↻ atualizar</button>
        </div>

        <div class="api-warning" id="apiWarning">
            ⚠️ Backend não encontrado em <code>localhost:8000</code>.
            Rode <code>uvicorn main:app --reload</code> e clique em atualizar.
        </div>

        <div class="metrics">
            <div class="metric">
                <div class="metric-label">total de contatos</div>
                <div class="metric-value" id="totalContatos">—</div>
            </div>
            <div class="metric">
                <div class="metric-label">follow-up hoje</div>
                <div class="metric-value today" id="totalHoje">—</div>
            </div>
            <div class="metric">
                <div class="metric-label">atrasados</div>
                <div class="metric-value late" id="totalAtrasados">—</div>
            </div>
        </div>

        <div class="form-card">
            <div class="section-title">novo contato</div>
            <div class="form-row">
                <div class="field">
                    <label for="inputNome">nome</label>
                    <input type="text" id="inputNome" placeholder="João Silva" />
                </div>
                <div class="field">
                    <label for="inputEmpresa">empresa</label>
                    <input type="text" id="inputEmpresa" placeholder="Empresa X" />
                </div>
            </div>
            <div class="form-row half">
                <div class="field">
                    <label for="inputData">próximo follow-up</label>
                    <input type="date" id="inputData" />
                </div>
            </div>
            <div class="form-actions">
                <button class="btn-primary" id="btnSalvar" onclick="salvarContato()">
                    + adicionar contato
                </button>
            </div>
        </div>

        <div class="section-title">próximos follow-ups</div>
        <div class="contacts-list" id="listaContatos">
            <div class="empty">carregando...</div>
        </div>

    </div>

    <!-- Modal remarcar data -->
    <div class="modal-overlay" id="modalOverlay" onclick="fecharModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-title">remarcar follow-up</div>
            <div class="field">
                <label for="novaData">nova data</label>
                <input type="date" id="novaData" />
            </div>
            <div class="modal-actions">
                <button class="btn-ghost" onclick="fecharModal()">cancelar</button>
                <button class="btn-primary" onclick="confirmarRemarcar()">salvar</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = "http://localhost:8000";
        let idEmEdicao = null;

        function hoje() {
            return new Date().toISOString().split("T")[0];
        }

        function classificar(data) {
            const h = hoje();
            if (data < h) return "urgente";
            if (data === h) return "hoje";
            return "ok";
        }

        function labelData(data) {
            const h = hoje();
            if (data < h) {
                const dias = Math.round((new Date(h) - new Date(data)) / 86400000);
                return dias === 1 ? "atrasado 1 dia" : `atrasado ${dias} dias`;
            }
            if (data === h) return "hoje";
            const dias = Math.round((new Date(data) - new Date(h)) / 86400000);
            return dias === 1 ? "amanhã" : `em ${dias} dias`;
        }

        function iniciais(nome) {
            return nome.split(" ").slice(0, 2).map(n => n[0]).join("").toUpperCase();
        }

        function showToast(msg, erro = false) {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.className = "toast show" + (erro ? " erro" : "");
            setTimeout(() => t.className = "toast", 2500);
        }

        function abrirModal(id, dataAtual) {
            idEmEdicao = id;
            document.getElementById("novaData").value = dataAtual;
            document.getElementById("modalOverlay").classList.add("show");
        }

        function fecharModal() {
            idEmEdicao = null;
            document.getElementById("modalOverlay").classList.remove("show");
        }

        async function confirmarRemarcar() {
            const novaData = document.getElementById("novaData").value;
            if (!novaData || !idEmEdicao) return;

            try {
                const res = await fetch(`${API}/contatos/${idEmEdicao}`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ proximo_contato: novaData })
                });
                if (!res.ok) throw new Error();
                fecharModal();
                showToast("follow-up remarcado ✓");
                carregarContatos();
            } catch {
                showToast("erro ao remarcar", true);
            }
        }

        async function deletarContato(id, nome) {
            if (!confirm(`Remover "${nome}"?`)) return;
            try {
                const res = await fetch(`${API}/contatos/${id}`, { method: "DELETE" });
                if (!res.ok) throw new Error();
                showToast("contato removido");
                carregarContatos();
            } catch {
                showToast("erro ao remover", true);
            }
        }

        async function carregarContatos() {
            try {
                const res = await fetch(`${API}/contatos`);
                if (!res.ok) throw new Error();
                document.getElementById("apiWarning").style.display = "none";

                const contatos = await res.json();
                const h = hoje();

                document.getElementById("totalContatos").textContent = contatos.length;
                document.getElementById("totalHoje").textContent = contatos.filter(c => c.proximo_contato === h).length;
                document.getElementById("totalAtrasados").textContent = contatos.filter(c => c.proximo_contato < h).length;

                const lista = document.getElementById("listaContatos");
                if (contatos.length === 0) {
                    lista.innerHTML = '<div class="empty">nenhum contato ainda — adicione o primeiro acima ☝️</div>';
                    return;
                }

                lista.innerHTML = contatos.map(c => {
                    const tipo = classificar(c.proximo_contato);
                    return `
            <div class="contact-card ${tipo}">
              <div class="avatar ${tipo}">${iniciais(c.nome)}</div>
              <div class="contact-info">
                <div class="contact-name">${c.nome}</div>
                <div class="contact-empresa">${c.empresa}</div>
              </div>
              <div class="contact-date">
                <div class="date-label">follow-up</div>
                <span class="date-badge ${tipo}">${labelData(c.proximo_contato)}</span>
              </div>
              <div class="contact-actions">
                <button class="btn-action remarcar" onclick="abrirModal(${c.id}, '${c.proximo_contato}')" title="Remarcar">↻</button>
                <button class="btn-action deletar" onclick="deletarContato(${c.id}, '${c.nome}')" title="Remover">✕</button>
              </div>
            </div>`;
                }).join("");

            } catch {
                document.getElementById("apiWarning").style.display = "block";
                document.getElementById("listaContatos").innerHTML = '<div class="empty">não foi possível conectar ao backend</div>';
                ["totalContatos", "totalHoje", "totalAtrasados"].forEach(id => {
                    document.getElementById(id).textContent = "—";
                });
            }
        }

        async function salvarContato() {
            const nome = document.getElementById("inputNome").value.trim();
            const empresa = document.getElementById("inputEmpresa").value.trim();
            const data = document.getElementById("inputData").value;

            if (!nome || !empresa || !data) { showToast("preencha todos os campos", true); return; }

            const btn = document.getElementById("btnSalvar");
            btn.disabled = true;
            btn.textContent = "salvando...";

            try {
                const res = await fetch(`${API}/contatos`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ nome, empresa, proximo_contato: data })
                });
                if (!res.ok) throw new Error();
                document.getElementById("inputNome").value = "";
                document.getElementById("inputEmpresa").value = "";
                document.getElementById("inputData").value = hoje();
                showToast("contato adicionado ✓");
                carregarContatos();
            } catch {
                showToast("erro ao salvar — backend rodando?", true);
            } finally {
                btn.disabled = false;
                btn.textContent = "+ adicionar contato";
            }
        }

        document.getElementById("inputData").value = hoje();
        carregarContatos();
    </script>
</body>

</html>
